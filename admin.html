<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影印計價後台管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1a1a2e;
      --accent: #e94560;
      --accent2: #0f3460;
      --surface: #16213e;
      --card: #1e2a45;
      --border: #2d3f6b;
      --text: #e0e8ff;
      --muted: #7a8ab0;
      --success: #2ecc71;
      --warning: #f39c12;
      --danger: #e74c3c;
      --info: #3498db;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--primary); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

    /* Header */
    .site-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem;
    }
    .site-header .logo {
      width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .site-header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .03em; }
    .site-header small { color: var(--muted); font-size: .78rem; }
    .btn-refresh {
      margin-left: auto; background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: .4rem .9rem; border-radius: 6px; font-size: .85rem;
      cursor: pointer; transition: all .2s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* Stats */
    .stats-row { display: flex; gap: 1.25rem; padding: 1.5rem 2rem 0; flex-wrap: wrap; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.1rem 1.5rem; flex: 1; min-width: 180px; position: relative; overflow: hidden;
    }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
    .stat-card.unpaid::before { background: var(--danger); }
    .stat-card.unprinted::before { background: var(--warning); }
    .stat-card.total::before { background: var(--success); }
    .stat-label { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .35rem; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.7rem; font-weight: 600; }
    .stat-card.unpaid .stat-value { color: #ff6b6b; }
    .stat-card.unprinted .stat-value { color: var(--warning); }
    .stat-card.total .stat-value { color: var(--success); }
    .stat-sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; }

    /* Table */
    .table-section { padding: 1.5rem 2rem 3rem; }
    .section-title { font-size: .78rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 1rem; }
    .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface); padding: .75rem 1rem; font-size: .75rem;
      text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
      font-weight: 600; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    td { padding: .7rem 1rem; font-size: .88rem; vertical-align: middle; }
    td.mono { font-family: 'JetBrains Mono', monospace; font-size: .82rem; color: var(--muted); }
    td.price { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text); }

    /* Print setting badges */
    .setting-badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 100px; font-size: .72rem;
      font-weight: 600; letter-spacing: .02em; white-space: nowrap;
    }
    .badge-bw { background: rgba(122,138,176,.15); color: var(--muted); border: 1px solid rgba(122,138,176,.3); }
    .badge-color { background: rgba(52,152,219,.15); color: #5dade2; border: 1px solid rgba(52,152,219,.3); }
    .badge-single { background: rgba(46,204,113,.1); color: #58d68d; border: 1px solid rgba(46,204,113,.3); }
    .badge-double { background: rgba(243,156,18,.1); color: #f5b041; border: 1px solid rgba(243,156,18,.3); }
    .badge-binding { background: rgba(233,69,96,.1); color: #ec7c8b; border: 1px solid rgba(233,69,96,.3); }

    /* Toggle */
    .toggle-wrap { display: flex; align-items: center; gap: .55rem; }
    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-track { width: 100%; height: 100%; border-radius: 11px; background: #2d3f6b; transition: background .2s; position: absolute; top: 0; left: 0; }
    .toggle input:checked ~ .toggle-track { background: var(--success); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 16px; height: 16px;
      border-radius: 50%; background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }
    .toggle.loading .toggle-track { background: #4a5568 !important; }
    .toggle.loading { cursor: wait; }

    /* Buttons */
    .btn-view-pdf {
      background: rgba(52,152,219,.15); border: 1px solid rgba(52,152,219,.3);
      color: #5dade2; padding: 4px 10px; border-radius: 6px; font-size: .78rem;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-view-pdf:hover { background: rgba(52,152,219,.3); }

    .btn-delete {
      background: rgba(231,76,60,.15); border: 1px solid rgba(231,76,60,.3);
      color: #e74c3c; padding: 4px 10px; border-radius: 6px; font-size: .78rem;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-delete:hover { background: rgba(231,76,60,.3); }

    /* PDF Modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      width: 100%; max-width: 800px; max-height: 90vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-shrink: 0;
    }
    .modal-header h3 { font-size: .95rem; font-weight: 700; margin: 0; }
    .modal-header .modal-meta { font-size: .8rem; color: var(--muted); }
    .btn-close-modal {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all .2s;
    }
    .btn-close-modal:hover { border-color: var(--accent); color: var(--accent); }
    .modal-settings {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
    }
    .modal-pdf-wrap { flex: 1; overflow: hidden; background: #525659; }
    .modal-pdf-wrap iframe { width: 100%; height: 100%; min-height: 500px; border: none; display: block; }

    /* Toast */
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: .5rem; z-index: 9999; }
    .toast-msg {
      background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--success);
      padding: .65rem 1rem; border-radius: 8px; font-size: .83rem; color: var(--text);
      animation: slideIn .25s ease; min-width: 220px;
    }
    .toast-msg.error { border-left-color: var(--danger); }
    @keyframes slideIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }

    .state-row td { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; margin-right: .5rem; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .stats-row { flex-direction: column; }
      .table-section, .stats-row { padding-left: 1rem; padding-right: 1rem; }
      thead { display: none; }
      tbody tr { display: block; padding: .75rem; border-bottom: 1px solid var(--border); }
      td { display: flex; justify-content: space-between; align-items: center; padding: .3rem 0; border: none; }
      td::before { content: attr(data-label); font-size: .72rem; color: var(--muted); text-transform: uppercase; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="logo">🖨</div>
  <div>
    <h1>影印計價後台管理</h1>
    <small>Print Order Management System</small>
  </div>
  <button class="btn-refresh" onclick="loadOrders()">↻ 重新整理</button>
</header>

<div class="stats-row">
  <div class="stat-card unpaid">
    <div class="stat-label">未付款總金額</div>
    <div class="stat-value" id="stat-unpaid">—</div>
    <div class="stat-sub" id="stat-unpaid-count">計算中…</div>
  </div>
  <div class="stat-card unprinted">
    <div class="stat-label">待列印份數</div>
    <div class="stat-value" id="stat-unprinted">—</div>
    <div class="stat-sub" id="stat-unprinted-pages">計算中…</div>
  </div>
  <div class="stat-card total">
    <div class="stat-label">訂單總數</div>
    <div class="stat-value" id="stat-total">—</div>
    <div class="stat-sub" id="stat-total-sub">已載入</div>
  </div>
</div>

<div class="announcement-section" style="padding: 1.5rem 2rem 0;">
  <div class="section-title">系統公告管理</div>
  <div class="row g-3">
    <!-- Left: Publish Form -->
    <div class="col-md-5">
      <div class="stat-card" style="height: 100%; min-height: 200px; display: flex; flex-direction: column; justify-content: space-between;">
        <div>
          <div class="stat-label">發佈新公告</div>
          <textarea id="announce-input" class="form-control" rows="4" placeholder="請輸入公告內容..." style="background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.9rem; resize: none; margin-top: 0.5rem;"></textarea>
        </div>
        <button id="btn-publish-announce" class="btn-view-pdf" style="margin-top: 1rem; width: 100%; padding: 8px 16px; font-weight: 600; text-align: center; justify-content: center; display: inline-flex; align-items: center;" onclick="publishAnnouncement()">
          📢 發布公告
        </button>
      </div>
    </div>
    <!-- Right: Announcement List -->
    <div class="col-md-7">
      <div class="table-wrapper" style="max-height: 200px; overflow-y: auto;">
        <table>
          <thead>
            <tr>
              <th style="width: 50%;">內容</th>
              <th>發佈時間</th>
              <th>顯示</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="announce-tbody">
            <tr class="state-row"><td colspan="4"><span class="spinner"></span>載入公告中…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="table-section">
  <div class="section-title">所有訂單</div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>姓名</th>
          <th>檔案名稱</th>
          <th>頁數</th>
          <th>列印設定</th>
          <th>金額</th>
          <th>已付款</th>
          <th>已列印</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="order-tbody">
        <tr class="state-row"><td colspan="9"><span class="spinner"></span>載入訂單中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-backdrop" id="pdf-modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <h3 id="modal-title">PDF 預覽</h3>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="btn-close-modal" onclick="closePdfModal()">✕</button>
    </div>
    <div class="modal-settings" id="modal-settings"></div>
    <div class="modal-pdf-wrap">
      <iframe id="modal-pdf-iframe" title="PDF預覽" src=""></iframe>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  const API_BASE = '';
  let orders = [];

  async function loadOrders() {
    const tbody = document.getElementById('order-tbody');
    tbody.innerHTML = '<tr class="state-row"><td colspan="9"><span class="spinner"></span>載入訂單中…</td></tr>';
    try {
      const res = await fetch(API_BASE + '/api/orders');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      orders = await res.json();
      renderTable(orders);
      renderStats(orders);
    } catch (e) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="9">⚠️ 載入失敗：' + e.message + '</td></tr>';
      showToast('載入訂單失敗：' + e.message, true);
    }
  }

  function renderStats(data) {
    const unpaidOrders = data.filter(o => !o.is_paid);
    const unpaidTotal = unpaidOrders.reduce((s, o) => s + (o.total_price || 0), 0);
    const unprintedOrders = data.filter(o => !o.is_printed);
    const unprintedPages = unprintedOrders.reduce((s, o) => s + (o.total_pages || 0), 0);
    document.getElementById('stat-unpaid').textContent = 'NT$ ' + unpaidTotal.toLocaleString();
    document.getElementById('stat-unpaid-count').textContent = '共 ' + unpaidOrders.length + ' 筆未付款';
    document.getElementById('stat-unprinted').textContent = unprintedPages.toLocaleString() + ' 頁';
    document.getElementById('stat-unprinted-pages').textContent = '共 ' + unprintedOrders.length + ' 份待列印';
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-total-sub').textContent = '已完成 ' + data.filter(o => o.is_paid && o.is_printed).length + ' 筆';
  }

  function buildSettingBadges(order) {
    const badges = [];
    const cm = order.color_mode;
    const duplex = order.duplex;
    const binding = order.binding;

    if (cm === 'color') {
      badges.push('<span class="badge-chip badge-color">彩色</span>');
    } else {
      badges.push('<span class="badge-chip badge-bw">黑白</span>');
    }
    if (duplex === 'double') {
      badges.push('<span class="badge-chip badge-double">雙面</span>');
      if (binding === 'short_edge') {
        badges.push('<span class="badge-chip badge-binding">短邊裝訂</span>');
      } else if (binding === 'long_edge') {
        badges.push('<span class="badge-chip badge-binding">長邊裝訂</span>');
      }
    } else {
      badges.push('<span class="badge-chip badge-single">單面</span>');
    }
    return '<div class="setting-badges">' + badges.join('') + '</div>';
  }

  function renderTable(data) {
    const tbody = document.getElementById('order-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="9">目前沒有任何訂單</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(order => `
      <tr id="row-${order.id}">
        <td data-label="#" class="mono">${order.id}</td>
        <td data-label="姓名">${escHtml(order.user_name)}</td>
        <td data-label="檔案" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(order.file_name)}">${escHtml(order.file_name)}</td>
        <td data-label="頁數" class="mono">${order.total_pages}</td>
        <td data-label="列印設定">${buildSettingBadges(order)}</td>
        <td data-label="金額" class="price">NT$ ${(order.total_price || 0).toLocaleString()}</td>
        <td data-label="已付款">
          <label class="toggle" id="toggle-paid-${order.id}">
            <input type="checkbox" ${order.is_paid ? 'checked' : ''} onchange="updateOrder(${order.id}, 'is_paid', this.checked, this)" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </td>
        <td data-label="Slide已列印">
          <label class="toggle" id="toggle-printed-${order.id}">
            <input type="checkbox" ${order.is_printed ? 'checked' : ''} onchange="updateOrder(${order.id}, 'is_printed', this.checked, this)" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </td>
        <td data-label="操作">
          <div class="d-flex gap-2">
            <button class="btn-view-pdf" onclick="openPdfModal(${order.id})">📄 查看</button>
            <button class="btn-delete" onclick="deleteOrder(${order.id})">🗑️ 刪除</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function openPdfModal(orderId) {
    const order = orders.find(o => o.id === orderId);
    if (!order) return;

    document.getElementById('modal-title').textContent = escHtml(order.file_name);
    document.getElementById('modal-meta').textContent =
      '訂單 #' + order.id + ' 姓名：' + escHtml(order.user_name) + ' 頁數：' + order.total_pages + ' 頁';

    document.getElementById('modal-settings').innerHTML = buildSettingBadges(order);

    const iframe = document.getElementById('modal-pdf-iframe');
    iframe.src = ''; // 先清空舊內容避免殘留

    try {
      showToast('正在載入 PDF 檔案...');
      const res = await fetch(API_BASE + '/api/orders/' + orderId + '/file');
      if (!res.ok) throw new Error('無法串流 PDF 檔案，HTTP ' + res.status);
      
      const blob = await res.blob();
      // 強制將 Blob 轉為 application/pdf 類型的物件網址
      const pdfBlob = new Blob([blob], { type: 'application/pdf' });
      const blobUrl = URL.createObjectURL(pdfBlob);
      
      iframe.src = blobUrl;
      iframe.dataset.blobUrl = blobUrl; // 儲存指標以便關閉時釋放記憶體
      
      document.getElementById('pdf-modal').classList.add('open');
    } catch (e) {
      showToast('檔案載入失敗：' + e.message, true);
    }
  }

  function closePdfModal() {
    document.getElementById('pdf-modal').classList.remove('open');
    const iframe = document.getElementById('modal-pdf-iframe');
    // 釋放記憶體，避免瀏覽器頁面越來越肥
    if (iframe.dataset.blobUrl) {
      URL.revokeObjectURL(iframe.dataset.blobUrl);
      iframe.removeAttribute('data-blobUrl');
    }
    iframe.src = '';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('pdf-modal')) closePdfModal();
  }

  async function updateOrder(orderId, field, value, checkbox) {
    const toggle = checkbox.closest('.toggle');
    toggle.classList.add('loading');
    checkbox.disabled = true;
    try {
      const res = await fetch(API_BASE + '/api/orders/' + orderId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: value })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const order = orders.find(o => o.id === orderId);
      if (order) order[field] = value;
      renderStats(orders);
      const label = field === 'is_paid' ? '付款狀態' : '列印狀態';
      showToast('訂單 #' + orderId + '：' + label + ' → ' + (value ? '✅ 已完成' : '⭕ 未完成'));
    } catch (e) {
      checkbox.checked = !value;
      showToast('更新失敗：' + e.message, true);
    } finally {
      toggle.classList.remove('loading');
      checkbox.disabled = false;
    }
  }

  async function deleteOrder(orderId) {
    if (!confirm(`⚠️ 確定要刪除訂單 #${orderId} 嗎？此操作將無法復原。`)) return;

    try {
      const res = await fetch(API_BASE + '/api/orders/' + orderId, {
        method: 'DELETE'
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);

      // 自前端資料排除此筆並重新整理畫面與統計
      orders = orders.filter(o => o.id !== orderId);
      renderTable(orders);
      renderStats(orders);
      showToast(`訂單 #${orderId} 已成功刪除`);
    } catch (e) {
      showToast('刪除訂單失敗：' + e.message, true);
    }
  }

  // ── 系統公告管理 ──
  let announcements = [];

  async function loadAnnouncements() {
    const tbody = document.getElementById('announce-tbody');
    tbody.innerHTML = '<tr class="state-row"><td colspan="4"><span class="spinner"></span>載入公告中…</td></tr>';
    try {
      const res = await fetch(API_BASE + '/api/admin/announcements');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      announcements = await res.json();
      renderAnnouncements(announcements);
    } catch (e) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="4">⚠️ 載入失敗：' + e.message + '</td></tr>';
      showToast('載入公告失敗：' + e.message, true);
    }
  }

  function renderAnnouncements(data) {
    const tbody = document.getElementById('announce-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr class="state-row"><td colspan="4">目前沒有任何公告</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(ann => `
      <tr id="announce-row-${ann.id}">
        <td style="word-break: break-all; max-width: 250px; text-align: left;" title="${escHtml(ann.content)}">${escHtml(ann.content)}</td>
        <td class="mono">${formatDate(ann.created_at)}</td>
        <td>
          <label class="toggle" id="toggle-announce-${ann.id}">
            <input type="checkbox" ${ann.is_active ? 'checked' : ''} onchange="updateAnnouncementStatus(${ann.id}, this.checked, this)" />
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </td>
        <td>
          <button class="btn-delete" onclick="deleteAnnouncement(${ann.id})">🗑️ 刪除</button>
        </td>
      </tr>
    `).join('');
  }

  async function publishAnnouncement() {
    const textEl = document.getElementById('announce-input');
    const content = textEl.value.trim();
    if (!content) {
      showToast('請輸入公告內容！', true);
      return;
    }

    const btn = document.getElementById('btn-publish-announce');
    btn.disabled = true;
    btn.textContent = '發布中...';

    try {
      const res = await fetch(API_BASE + '/api/announcements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      
      showToast('公告發布成功！');
      textEl.value = '';
      loadAnnouncements();
    } catch (e) {
      showToast('發布失敗：' + e.message, true);
    } finally {
      btn.disabled = false;
      btn.textContent = '📢 發布公告';
    }
  }

  async function updateAnnouncementStatus(id, isActive, checkbox) {
    const toggle = checkbox.closest('.toggle');
    toggle.classList.add('loading');
    checkbox.disabled = true;
    try {
      const res = await fetch(API_BASE + '/api/announcements/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ is_active: isActive })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const ann = announcements.find(a => a.id === id);
      if (ann) ann.is_active = isActive;
      showToast('公告 #' + id + ' 狀態更新成功');
    } catch (e) {
      checkbox.checked = !isActive;
      showToast('更新公告狀態失敗：' + e.message, true);
    } finally {
      toggle.classList.remove('loading');
      checkbox.disabled = false;
    }
  }

  async function deleteAnnouncement(id) {
    if (!confirm(`確定要刪除公告 #${id} 嗎？此操作將無法復原。`)) return;

    try {
      const res = await fetch(API_BASE + '/api/announcements/' + id, {
        method: 'DELETE'
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      
      announcements = announcements.filter(a => a.id !== id);
      renderAnnouncements(announcements);
      showToast('公告已成功刪除');
    } catch (e) {
      showToast('刪除公告失敗：' + e.message, true);
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hours = String(d.getHours()).padStart(2, '0');
      const minutes = String(d.getMinutes()).padStart(2, '0');
      return `${year}-${month}-${day} ${hours}:${minutes}`;
    } catch (e) {
      return dateStr;
    }
  }

  function showToast(msg, isError = false) {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast-msg' + (isError ? ' error' : '');
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadOrders();
  loadAnnouncements();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
